<div class="flex min-h-[60vh] items-center justify-center p-4">
  @if (privileges().length > 0) {
    <div class="flex flex-wrap items-start justify-center gap-6">
      @for (service of privileges(); track service.serviceID) {
        <z-card class="w-72">
          <z-card-content class="flex flex-col gap-4">
            <!-- Service header -->
            <div class="flex items-center gap-2 border-b pb-3">
              <ng-icon name="lucidePhone" class="text-2xl text-primary" />
              <span class="text-3xl font-bold text-primary">{{ service.serviceName }}</span>
            </div>

            <!-- Roles -->
            <div class="flex flex-col gap-2">
              @for (role of service.roles; track role.RoleID) {
                <button
                  type="button"
                  class="w-full rounded-md border border-input px-3 py-2 text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground"
                  (click)="selectRole(role, service)"
                >
                  {{ role.RoleName }}
                </button>
              }
            </div>
          </z-card-content>
        </z-card>
      }
    </div>
  } @else {
    <p class="text-center text-muted-foreground">
      You do not have sufficient privilege to access application roles
    </p>
  }
</div>
