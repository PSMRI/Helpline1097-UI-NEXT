<div class="flex min-h-screen flex-col bg-muted/30">
  <!-- Header -->
  <header class="flex items-center gap-3 bg-primary px-4 py-2 text-primary-foreground">
    <!-- Brand -->
    <div class="flex shrink-0 items-center gap-2">
      <img src="assets/images/smLogo.png" alt="Piramal Swasthya" class="h-7 w-auto" />
      <span class="text-lg font-semibold tracking-wide">AMRIT</span>
    </div>

    <!-- Title (centered) -->
    <h1 class="flex-1 truncate text-center text-base font-semibold sm:text-lg">{{ title() }}</h1>

    <!-- Controls -->
    <div class="flex shrink-0 items-center gap-2 sm:gap-3">
      <z-select
        class="w-28"
        [zValue]="ui.language()"
        (zValueChange)="onLanguageChange($event)"
        aria-label="Select language"
      >
        @for (lang of languages; track lang) {
          <z-select-item [zValue]="lang">{{ lang }}</z-select-item>
        }
      </z-select>

      <span class="hidden text-sm sm:inline">Welcome {{ userName() }}</span>

      <!-- Emergency contacts (Dashboard only) -->
      @if (showContacts()) {
        <button
          type="button"
          class="flex h-8 w-8 items-center justify-center rounded-md text-primary-foreground/90 transition-colors hover:bg-primary-foreground/15"
          aria-label="Emergency contacts"
          title="Emergency contacts"
          (click)="openEmergencyContacts()"
        >
          <ng-icon name="lucidePhone" class="text-xl" />
        </button>
      }

      <!-- Force logout (CO only, Dashboard only) -->
      @if (showContacts() && isCO()) {
        <button
          type="button"
          class="flex h-8 w-8 items-center justify-center rounded-md text-primary-foreground/90 transition-colors hover:bg-primary-foreground/15"
          aria-label="Force logout"
          title="Force logout"
          (click)="openForceLogout()"
        >
          <ng-icon name="lucideUserX" class="text-xl" />
        </button>
      }

      <!-- User menu -->
      <button
        type="button"
        [zMenuTriggerFor]="userMenu"
        class="flex h-8 w-8 items-center justify-center rounded-md text-primary-foreground/90 transition-colors hover:bg-primary-foreground/15"
        aria-label="User menu"
        title="User"
      >
        <ng-icon name="lucideUser" class="text-xl" />
      </button>
      <z-menu #userMenu>
        <div class="px-3 py-1.5">
          <p class="text-sm font-medium">{{ userName() }}</p>
          <p class="text-xs text-muted-foreground">ID: {{ idRoleService() }}</p>
        </div>
      </z-menu>

      <!-- Help menu -->
      <button
        type="button"
        [zMenuTriggerFor]="helpMenu"
        class="flex h-8 w-8 items-center justify-center rounded-md text-primary-foreground/90 transition-colors hover:bg-primary-foreground/15"
        aria-label="Help"
        title="Help"
      >
        <ng-icon name="lucideCircleHelp" class="text-xl" />
      </button>
      <z-menu #helpMenu>
        <button z-menu-item (click)="openVersion()">Version</button>
        <button z-menu-item (click)="openLicense()">License Info</button>
      </z-menu>

      <button
        type="button"
        class="flex h-8 w-8 items-center justify-center rounded-md text-primary-foreground/90 transition-colors hover:bg-primary-foreground/15"
        aria-label="Logout"
        title="Logout"
        (click)="logout()"
      >
        <ng-icon name="lucidePower" class="text-xl" />
      </button>
    </div>
  </header>

  <!-- Content -->
  <main class="flex-1">
    <router-outlet />
  </main>

  <!-- Footer -->
  <footer
    class="flex items-center justify-between bg-neutral-900 px-4 py-2 text-xs text-neutral-300"
  >
    <span>&copy; 2026 PSMRI</span>
    <span>Version {{ appVersion }}</span>
  </footer>
</div>
