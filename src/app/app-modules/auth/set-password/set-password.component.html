<div
  class="flex min-h-screen flex-col items-center justify-center bg-gradient-to-br from-primary/5 via-background to-primary/10 p-4"
>
  <z-card class="w-full max-w-md">
    <z-card-header class="justify-items-center text-center">
      <img src="assets/images/Swasthya.png" alt="Piramal Swasthya" class="mx-auto h-12 w-auto" />
      <z-card-title class="mt-2 text-xl">Account Support</z-card-title>
      <z-card-description>Follow the steps to change/reset the password</z-card-description>
    </z-card-header>

    <z-card-content>
      <form [formGroup]="form" (ngSubmit)="updatePassword()" autocomplete="off" class="flex flex-col gap-4">
        <!-- New password -->
        <div class="flex flex-col gap-1.5">
          <label for="newpwd" class="text-sm font-medium">
            New Password <span class="text-destructive">*</span>
          </label>
          <div class="relative">
            <ng-icon
              name="lucideLock"
              class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"
            />
            <input
              z-input
              id="newpwd"
              formControlName="newpwd"
              [type]="showPassword() ? 'text' : 'password'"
              class="px-9"
              placeholder="New Password"
              autocomplete="new-password"
            />
            <button
              type="button"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground transition-colors hover:text-foreground"
              aria-label="Show password"
              (mousedown)="revealPassword(true)"
              (mouseup)="revealPassword(false)"
              (mouseleave)="revealPassword(false)"
            >
              <ng-icon name="lucideEye" />
            </button>
          </div>
          @if (form.controls.newpwd.touched && form.controls.newpwd.invalid) {
            <p class="text-xs text-destructive">
              Password is required (min:8, max:12, alphanumeric, 1 special character, 1 upper case)
            </p>
          }
        </div>

        <!-- Confirm password -->
        <div class="flex flex-col gap-1.5">
          <label for="confirmpwd" class="text-sm font-medium">
            Confirm Password <span class="text-destructive">*</span>
          </label>
          <div class="relative">
            <ng-icon
              name="lucideLock"
              class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"
            />
            <input
              z-input
              id="confirmpwd"
              formControlName="confirmpwd"
              [type]="showPassword() ? 'text' : 'password'"
              class="px-9"
              placeholder="Confirm Password"
              autocomplete="new-password"
            />
            <button
              type="button"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground transition-colors hover:text-foreground"
              aria-label="Show password"
              (mousedown)="revealPassword(true)"
              (mouseup)="revealPassword(false)"
              (mouseleave)="revealPassword(false)"
            >
              <ng-icon name="lucideEye" />
            </button>
          </div>
        </div>

        <button z-button type="submit" zFull [zDisabled]="form.invalid">Change Password</button>
      </form>
    </z-card-content>
  </z-card>

  <footer class="mt-6 text-center text-xs text-muted-foreground">
    <p>&copy; 2026 PSMRI &middot; AMRIT</p>
  </footer>
</div>
