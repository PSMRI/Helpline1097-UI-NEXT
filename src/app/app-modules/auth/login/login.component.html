<div
  class="flex min-h-screen flex-col items-center justify-center bg-gradient-to-br from-primary/5 via-background to-primary/10 p-4"
>
  <z-card class="w-full max-w-md">
    <z-card-header class="justify-items-center text-center">
      <img src="assets/images/Swasthya.png" alt="Piramal Swasthya" class="mx-auto h-12 w-auto" />
      <z-card-title class="mt-2 text-xl">AMRIT 1097 Helpline</z-card-title>
      <z-card-description>Sign in to your account to continue</z-card-description>
    </z-card-header>

    <z-card-content>
      <form [formGroup]="form" (ngSubmit)="login()" autocomplete="off" class="flex flex-col gap-4">
        <!-- Username -->
        <div class="flex flex-col gap-1.5">
          <label for="userID" class="text-sm font-medium">
            User Name <span class="text-destructive">*</span>
          </label>
          <div class="relative">
            <ng-icon
              name="lucideUser"
              class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"
            />
            <input
              z-input
              id="userID"
              formControlName="userID"
              [appRestrictInput]="usernameBlockPattern"
              type="text"
              class="pl-9"
              placeholder="Enter user name"
              autocomplete="off"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="flex flex-col gap-1.5">
          <label for="password" class="text-sm font-medium">
            Password <span class="text-destructive">*</span>
          </label>
          <div class="flex items-center gap-2">
            <div class="relative flex-1">
              <ng-icon
                name="lucideLock"
                class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"
              />
              <input
                z-input
                id="password"
                formControlName="password"
                [type]="showPassword() ? 'text' : 'password'"
                class="pl-9"
                placeholder="Enter password"
                autocomplete="off"
              />
            </div>
            <button
              type="button"
              class="flex h-9 w-10 shrink-0 items-center justify-center rounded-lg border border-input text-muted-foreground transition-colors hover:bg-accent"
              aria-label="Show password"
              (mousedown)="revealPassword(true)"
              (mouseup)="revealPassword(false)"
              (mouseleave)="revealPassword(false)"
            >
              <ng-icon name="lucideEye" />
            </button>
          </div>
        </div>

        <!-- Captcha (optional) -->
        @if (enableCaptcha) {
          <div role="group" aria-label="Security check" class="flex justify-center">
            <app-captcha #captchaCmp (tokenResolved)="onCaptchaResolved($event)" />
          </div>
        }

        <div class="text-right">
          <a routerLink="/resetPassword" class="text-sm font-medium text-primary hover:underline">
            Forgot Password?
          </a>
        </div>

        <button z-button type="submit" zFull [zDisabled]="loginDisabled()">Login</button>

        @if (loginResult()) {
          <p class="text-center text-sm text-destructive" role="alert">{{ loginResult() }}</p>
        }
      </form>
    </z-card-content>
  </z-card>

  <footer class="mt-6 text-center text-xs text-muted-foreground">
    <p>&copy; 2026 PSMRI &middot; AMRIT</p>
  </footer>
</div>
