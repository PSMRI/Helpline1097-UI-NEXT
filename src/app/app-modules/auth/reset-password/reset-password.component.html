<div
  class="flex min-h-screen flex-col items-center justify-center bg-gradient-to-br from-primary/5 via-background to-primary/10 p-4"
>
  <z-card class="w-full max-w-md">
    <z-card-header class="justify-items-center text-center">
      <img src="assets/images/Swasthya.png" alt="Piramal Swasthya" class="mx-auto h-12 w-auto" />
      <z-card-title class="mt-2 text-xl">Account Support</z-card-title>
      <z-card-description>Follow the steps to change/reset the password</z-card-description>
    </z-card-header>

    <z-card-content>
      <!-- Stage 1: username -->
      @if (stage() === 'username') {
        <div class="flex flex-col gap-4">
          <div class="flex flex-col gap-1.5">
            <label for="userID" class="text-sm font-medium">
              User Name <span class="text-destructive">*</span>
            </label>
            <div class="relative">
              <ng-icon
                name="lucideUser"
                class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"
              />
              <input
                z-input
                id="userID"
                [formControl]="usernameCtrl"
                [appRestrictInput]="usernameBlockPattern"
                type="text"
                class="pl-9"
                placeholder="Enter User Name"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <button z-button zType="outline" type="button" routerLink="/">Cancel</button>
            <button
              z-button
              type="button"
              [zDisabled]="usernameCtrl.invalid"
              (click)="getQuestions()"
            >
              Next
            </button>
          </div>
        </div>
      }

      <!-- Stage 2: security questions (all on one screen) -->
      @if (stage() === 'questions') {
        <div class="flex flex-col gap-4">
          @for (q of questions(); track q.questionId; let i = $index) {
            <div class="flex flex-col gap-1.5">
              <label [for]="'answer-' + i" class="text-sm font-medium">
                {{ q.question }} <span class="text-destructive">*</span>
              </label>
              <div class="relative">
                <ng-icon
                  name="lucideKeyRound"
                  class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"
                />
                <input
                  z-input
                  [id]="'answer-' + i"
                  [formControl]="answers().at(i)"
                  [appRestrictInput]="answerBlockPattern"
                  [type]="showAnswers() ? 'text' : 'password'"
                  class="px-9"
                  placeholder="Enter Answer"
                  autocomplete="off"
                />
                <button
                  type="button"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground transition-colors hover:text-foreground"
                  aria-label="Show answers"
                  (mousedown)="revealAnswers(true)"
                  (mouseup)="revealAnswers(false)"
                  (mouseleave)="revealAnswers(false)"
                >
                  <ng-icon name="lucideEye" />
                </button>
              </div>
            </div>
          }

          <button
            z-button
            type="button"
            zFull
            [zDisabled]="!answersValid()"
            (click)="submitAnswers()"
          >
            Submit
          </button>
        </div>
      }
    </z-card-content>
  </z-card>

  <footer class="mt-6 text-center text-xs text-muted-foreground">
    <p>&copy; 2026 PSMRI &middot; AMRIT</p>
  </footer>
</div>
